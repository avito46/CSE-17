upstream flask_app {
    server app:5000;
}

server {
    listen 80;
    server_name localhost;

    # Optimized static resource handling — served directly by Nginx (not Flask)
    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        gzip on;
        gzip_types text/css application/javascript text/plain;
        access_log off;
    }

    # Health check endpoint — bypass app for quick load balancer pings
    location /health {
        proxy_pass http://flask_app;
        access_log off;
    }

    # All other requests proxy to Flask via gunicorn
    location / {
        proxy_pass http://flask_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
}
