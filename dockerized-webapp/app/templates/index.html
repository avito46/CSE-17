<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NoteStack — Dockerized Web App</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon"></span>
        <span>NoteStack</span>
      </div>
      <div class="header-meta">
        <span class="badge">Flask + MySQL + Docker</span>
      </div>
    </div>
  </header>

  <main>
    <section class="form-section">
      <h2>Add a Note</h2>
      <div class="form-group">
        <input type="text" id="title" placeholder="Title" maxlength="100" />
        <span class="char-count" id="title-count">0/100</span>
      </div>
      <div class="form-group">
        <textarea id="content" placeholder="Write your note here..." rows="4" maxlength="500"></textarea>
        <span class="char-count" id="content-count">0/500</span>
      </div>
      <div class="error-msg" id="error-msg"></div>
      <button id="add-btn" onclick="addNote()">Add Note</button>
    </section>

    <section class="notes-section">
      <div class="notes-header">
        <h2>Your Notes</h2>
        <span class="note-count" id="note-count">0 notes</span>
      </div>
      <div id="notes-list" class="notes-list">
        <div class="empty-state">No notes yet. Add one above!</div>
      </div>
    </section>
  </main>

  <footer>
    <p>Dockerized Web Application — Aviral Dwivedi &nbsp;|&nbsp; Flask · MySQL · Docker · Nginx · Git</p>
  </footer>

  <script src="/static/js/main.js"></script>
</body>
</html>
